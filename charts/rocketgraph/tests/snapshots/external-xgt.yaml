              containerPort: 5000
              protocol: TCP
          env:
            - name: MC_MONGO_URI
              value: "mongodb://test-release-mongodb:27017"
            - name: MC_DEFAULT_XGT_HOST
              value: "xgt.example.com"
            - name: MC_DEFAULT_XGT_PORT
              value: ""
            - name: MC_SESSION_TTL
              value: ""
            - name: XGT_SERVER_CN
              value: ""
            - name: XGT_AUTH_TYPES
              value: "['BasicAuth', 'FilePKIAuth', 'PKIAuth']"
            - name: LD_LIBRARY_PATH
              value: "/odbc"
            - name: MC_PORT
              value: "80"
            - name: MC_SSL_PORT
              value: "443"
            - name: MC_XGT_ALLOWED_HOSTS
              value: ""
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: odbc-config
              mountPath: /odbc
      restartPolicy: Always
      volumes:
        - name: odbc-config
          configMap:
            name: test-release-backend-odbc-config
