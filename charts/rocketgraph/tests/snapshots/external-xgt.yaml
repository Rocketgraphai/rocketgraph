# Source: rocketgraph/templates/mongodb-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-release-mongodb
  labels:
    app: mongodb
    helm.sh/chart: rocketgraph-0.1.0
    app.kubernetes.io/name: rocketgraph
    app.kubernetes.io/version: "2.6.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: test-release
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
      app.kubernetes.io/instance: test-release
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongodb
        app.kubernetes.io/instance: test-release
    spec:
      containers:
        - name: mongodb
          image: "docker.io/library/mongo:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      restartPolicy: Always
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: test-release-mongodb-data
