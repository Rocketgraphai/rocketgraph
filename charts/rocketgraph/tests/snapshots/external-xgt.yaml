        app: backend
        app.kubernetes.io/instance: test-release
      annotations:
        checksum/odbc-config: a31521a0c3e811ebe09e9c63d4639d9e828db296e5e129f718d4b88c3cc07253
    spec:
      containers:
        - name: backend
          image: "docker.io/rocketgraph/mission-control-backend:2.6.0"
          imagePullPolicy: IfNotPresent
          ports:
