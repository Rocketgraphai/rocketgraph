{{- if .Values.openshift.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-rocketgraph-anyuid-{{ .Release.Namespace }}
  labels:
    {{- include "rocketgraph.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: {{ include "rocketgraph.fullname.serviceaccount" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
