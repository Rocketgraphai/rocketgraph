{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rocketgraph.fullname.mongodb" . }}
  labels:
    app: mongodb
    {{- include "rocketgraph.labels" . | nindent 4 }}
  {{- with .Values.mongodb.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
  selector:
    app: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
