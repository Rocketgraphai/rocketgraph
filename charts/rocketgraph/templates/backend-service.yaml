apiVersion: v1
kind: Service
metadata:
  name: {{ include "rocketgraph.fullname.backend" . }}
  labels:
    app: backend
    {{- include "rocketgraph.labels" . | nindent 4 }}
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  selector:
    app: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
